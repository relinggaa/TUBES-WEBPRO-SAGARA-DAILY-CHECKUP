sonar.projectKey=${SONAR_PROJECT_KEY}
sonar.organization=${SONAR_ORGANIZATION}

# Source & tests
sonar.sources=resources/js,app
sonar.tests=resources/js/__tests__
sonar.test.inclusions=resources/js/__tests__/**/*.test.jsx,resources/js/__tests__/**/*.spec.jsx

# Coverage report for JS (generated by Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# PHP exclusions (coverage via php artisan test is not set up here)
sonar.exclusions=vendor/**,node_modules/**,public/**,storage/**,bootstrap/cache/**,resources/js/__tests__/**

# Language settings
sonar.sourceEncoding=UTF-8
